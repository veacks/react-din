name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run validate:docs
      - run: npm run validate:coverage
      - if: github.event_name == 'pull_request'
        run: npm run validate:changes
        env:
          VALIDATE_CHANGES_BASE: ${{ github.event.pull_request.base.sha }}
          VALIDATE_CHANGES_HEAD: ${{ github.sha }}
      - if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        run: npm run validate:changes
        env:
          VALIDATE_CHANGES_BASE: ${{ github.event.before }}
          VALIDATE_CHANGES_HEAD: ${{ github.sha }}

  library-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:library

  playground-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:playground

  playground-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
